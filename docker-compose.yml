services:
  postgres:
    image: postgres:16
    container_name: enterprise-user-api-db

    environment:
      POSTGRES_DB: automationdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

    networks:
      - enterprise-user-api-network

  app:
    image: enterprise-user-api:latest
    container_name: enterprise-user-api

    depends_on:
      - postgres

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/automationdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      AUTH_TYPE: jwt
      SPRING_PROFILES_ACTIVE: jwt

    ports:
      - "8081:8081"

    networks:
      - enterprise-user-api-network

volumes:
  postgres_data:

networks:
  enterprise-user-api-network:
    name: user-api_enterprise-user-api-network